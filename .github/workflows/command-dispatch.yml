---
# WARNING: This file is autogenerated - changes will be overwritten when regenerated
# by https://github.com/pulumi/ci-mgmt
env:
  PULUMI_GO_DEP_ROOT: ${{ github.workspace }}/..
  PULUMI_LOCAL_NUGET: ${{ github.workspace }}/nuget
  PULUMI_PULUMI_ENABLE_JOURNALING: 'true'
  TF_APPEND_USER_AGENT: pulumi
jobs:
  command-dispatch-for-testing:
    name: command-dispatch-for-testing
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write  # For ESC secrets.
    steps:
      - name: Checkout Repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false
      - uses: peter-evans/slash-command-dispatch@5c11dc7efead556e3bdabf664302212f79eb26fa  # v5
        with:
          commands: |
            run-acceptance-tests
            release
          issue-type: pull-request
          permission: write
          reaction-token: ${{ secrets.GITHUB_TOKEN }}
          repository: ${{ github.repository }}
          token: ${{ secrets.PULUMI_BOT_TOKEN }}
name: command-dispatch
on:
  issue_comment:
    types:
      - created
      - edited
